# Dependabot configuration.
#
# Vulnerability alerts at the repo level already cover security CVEs
# across all ecosystems automatically. This config adds routine
# (non-CVE) version updates for the ecosystems where staying current
# matters: GitHub Actions, Dockerfiles, Docker Compose, and npm.
#
# GitHub Actions stay on a weekly cadence so deployment tooling updates
# can be exercised promptly. npm routine updates are monthly because a
# single group can cover broad application and test-runtime behavior.

version: 2
updates:
    # GitHub Actions: small list of ~10 pinned action SHAs. Grouped into
    # one weekly PR. Major bumps are NOT separated — the immediate
    # motivating case is the June 2026 Node 24 forced switch, which
    # manifests as v4→v5 majors on several actions (actions/checkout
    # etc.) and we want those in the weekly bundle. When a major bump
    # arrives, review more carefully (release notes + staging-as-canary
    # ladder) before merging.
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      groups:
          github-actions:
              patterns:
                  - "*"

    # Dockerfiles: keep the Node and backup Alpine base images visible as
    # focused monthly PRs. Dependabot only proposes changes; each image bump
    # still passes through normal CI, staging, and production approval.
    - package-ecosystem: "docker"
      directory: "/"
      schedule:
          interval: "monthly"

    # Docker Compose: monitor static service images such as PostgreSQL across
    # the root compose files. Keep this separate from Dockerfile updates so a
    # database image change can be reviewed and staged independently.
    - package-ecosystem: "docker-compose"
      directory: "/"
      schedule:
          interval: "monthly"

    # npm: large dependency tree. Handle updates in two paths so easier
    # bumps are reviewed together and risky ones get focused review:
    #   - "minor-and-patch": bundled into one monthly PR. Even routine
    #     packages can span application behavior, so review and stage
    #     before merging.
    #   - Major bumps fall outside the group → one PR per major. These
    #     are the ones that may have breaking changes and warrant
    #     reading release notes / running staging before merge.
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "monthly"
      groups:
          minor-and-patch:
              update-types:
                  - "minor"
                  - "patch"
