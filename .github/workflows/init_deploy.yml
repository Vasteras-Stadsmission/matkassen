name: Initial deploy to Elastx

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Target environment"
                required: true
                type: choice
                options:
                    - production
                    - staging
                default: "staging"

permissions:
    contents: read

jobs:
    deploy:
        name: Deploy to ${{ github.event.inputs.environment }}
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        environment: ${{ github.event.inputs.environment }}
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Display target environment
              run: |
                  echo "=================================="
                  echo "DEPLOYING TO ${{ github.event.inputs.environment }} ENVIRONMENT"
                  echo "=================================="

            - name: Add to workflow summary
              run: |
                  echo "## 🚀 Deploying to ${{ github.event.inputs.environment }} environment" >> $GITHUB_STEP_SUMMARY

            - name: Set server host based on environment
              id: set-host
              run: |
                  if [ "${{ github.event.inputs.environment }}" == "production" ]; then
                    echo "server_host=${{ secrets.SERVER_HOST_PRODUCTION }}" >> $GITHUB_OUTPUT
                  else
                    echo "server_host=${{ secrets.SERVER_HOST_STAGING }}" >> $GITHUB_OUTPUT
                  fi

            - name: Deploy via SSH
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
              with:
                  host: ${{ steps.set-host.outputs.server_host }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  script: |
                      # Fail fast on errors (defense in depth — init_deploy re-clones so
                      # the stale-branch bug doesn't apply, but strict mode is the right
                      # default for deploy scripts). Assumes the remote login shell is
                      # bash (`pipefail` is a bashism).
                      set -euo pipefail

                      echo "Export GitHub secrets into environment variables"
                      export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
                      export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
                      export EMAIL="${{ secrets.EMAIL }}"
                      export AUTH_GITHUB_ID="${{ secrets.AUTH_GITHUB_ID }}"
                      export AUTH_GITHUB_SECRET="${{ secrets.AUTH_GITHUB_SECRET }}"
                      export AUTH_SECRET="${{ secrets.AUTH_SECRET }}"
                      export AUTH_GITHUB_APP_ID="${{ secrets.AUTH_GITHUB_APP_ID }}"
                      export AUTH_GITHUB_APP_PRIVATE_KEY="${{ secrets.AUTH_GITHUB_APP_PRIVATE_KEY }}"
                      export AUTH_GITHUB_APP_INSTALLATION_ID="${{ secrets.AUTH_GITHUB_APP_INSTALLATION_ID }}"
                      export GITHUB_ORG="vasteras-stadsmission"
                      export ENV_NAME="${{ github.event.inputs.environment }}"
                      # Optional: set the DATABASE_SSL repo/environment secret to
                      # "require" or "verify-full" when the DB is managed/external.
                      # Leave unset for the current trusted-network Docker DB.
                      export DATABASE_SSL="${{ secrets.DATABASE_SSL }}"

                      if [ "${{ github.event.inputs.environment }}" == "production" ]; then
                        export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD_PRODUCTION }}"
                        export HELLO_SMS_USERNAME="${{ secrets.HELLO_SMS_USERNAME }}"
                        export HELLO_SMS_PASSWORD="${{ secrets.HELLO_SMS_PASSWORD }}"
                        export SMS_SENDER="Matcentral"
                        export HELLO_SMS_TEST_MODE="false"
                        export SMS_SEND_INTERVAL="5 minutes"
                        export SMS_CALLBACK_SECRET="${{ secrets.SMS_CALLBACK_SECRET }}"
                        export LOG_LEVEL="info"
                        export DOMAIN_NAME="matcentralen.com"
                        export BRAND_NAME="Matcentralen"
                        export ANONYMIZATION_SCHEDULE="0 2 * * 0"
                        export ANONYMIZATION_INACTIVE_DURATION="1 year"
                        export ORG_SYNC_SCHEDULE="0 3 * * *"
                        export DB_BACKUP_PASSPHRASE="${{ secrets.DB_BACKUP_PASSPHRASE }}"
                        # OpenStack Swift (env_auth) for backups - hardcoded non-sensitive values.
                        # All five hardcoded vars are explicit (not relying on deploy.sh's
                        # defaults) so the workflow is self-documenting and matches
                        # continuous_deployment.yml's exports.
                        export OS_AUTH_TYPE=v3applicationcredential
                        export OS_AUTH_URL=https://ops.elastx.cloud:5000/v3
                        export OS_REGION_NAME=se-sto
                        export OS_INTERFACE=public
                        export OS_IDENTITY_API_VERSION=3
                        export OS_APPLICATION_CREDENTIAL_ID="${{ secrets.OS_APPLICATION_CREDENTIAL_ID }}"
                        export OS_APPLICATION_CREDENTIAL_SECRET="${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}"
                        export SWIFT_CONTAINER="${{ secrets.SWIFT_CONTAINER }}"
                        export SLACK_BOT_TOKEN="${{ secrets.SLACK_BOT_TOKEN }}"
                        export SLACK_CHANNEL_ID="${{ secrets.SLACK_CHANNEL_ID }}"
                      else
                        export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD_STAGING }}"
                        export DOMAIN_NAME="staging.matcentralen.com"
                        export BRAND_NAME="Matcentralen"
                        export LOG_LEVEL="debug"
                        export HELLO_SMS_TEST_MODE="true"
                        export SMS_SEND_INTERVAL="30 seconds"
                        export ANONYMIZATION_SCHEDULE="*/15 * * * *"
                        export ANONYMIZATION_INACTIVE_DURATION="365 days"
                        export ORG_SYNC_SCHEDULE="0 3 * * *"
                        # SMS credentials not needed in staging (test mode only)
                        # Backups disabled on staging by policy (no DB_BACKUP_PASSPHRASE exported)
                      fi

                      echo "Setting DOMAIN_NAME to $DOMAIN_NAME"
                      echo "Setting BRAND_NAME to $BRAND_NAME"

                      # Derive Swift prefix from env name
                      export SWIFT_PREFIX="backups/${ENV_NAME}"

                      # Explicit path rather than `~/matkassen`. The ssh-action runs
                      # this as the `ubuntu` user so `~` would resolve correctly,
                      # but hardcoding removes the fragility if anyone ever wraps
                      # a command in sudo.
                      APP_DIR="/home/ubuntu/matkassen"

                      echo "Checking if app directory exists"
                      if [ -d "$APP_DIR" ]; then
                        echo "Directory exists, removing it"
                        rm -rf "$APP_DIR"
                      fi

                      # Create the directory with owner-only perms BEFORE git
                      # clone, so the repo lands in an already-hardened dir.
                      # git clone into an existing empty directory is supported.
                      sudo install -d -m 700 -o ubuntu -g ubuntu "$APP_DIR"

                      echo "Cloning the repository (shallow clone for faster deployment)"
                      git clone --depth 1 https://github.com/Vasteras-Stadsmission/matkassen.git "$APP_DIR"

                      echo "Change directory to the app folder"
                      cd "$APP_DIR"

                      echo "Run the deploy script"
                      chmod +x deploy.sh
                      # `set -euo pipefail` above means a non-zero exit aborts the
                      # whole script, so the explicit status check is redundant.
                      ./deploy.sh
                      echo "✅ Successfully deployed the application to the VPS."
