name: Continuous Deployment

on:
    push:
        branches: [main]

permissions:
    contents: read
    packages: write # Required for pushing to GHCR

jobs:
    publish-images:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - name: Main Application
                      dockerfile: Dockerfile
                      image_name: vasteras-stadsmission/matkassen
                      context: .
                    - name: Database Backup Service
                      dockerfile: Dockerfile.db-backup
                      image_name: vasteras-stadsmission/matkassen-db-backup
                      context: .

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
              with:
                  images: ghcr.io/${{ matrix.image_name }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha,prefix=sha-,format=long

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Build and push ${{ matrix.name }}
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Image published successfully
              run: |
                  echo "✅ ${{ matrix.name }} published to GHCR"
                  echo "📦 Image: ghcr.io/${{ matrix.image_name }}"
                  echo "🏷️  Tags: ${{ steps.meta.outputs.tags }}"

    deploy-to-staging:
        needs: publish-images
        runs-on: ubuntu-latest
        concurrency:
            group: deploy-staging
            cancel-in-progress: false
        environment:
            name: staging
            url: https://staging.matcentralen.com
        steps:
            - name: Deploy to staging
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
              with:
                  host: ${{ secrets.SERVER_HOST_STAGING }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  script: |
                      # Fail fast on errors — this block used to swallow git failures and
                      # leave the VPS on an outdated commit while reporting success.
                      # Assumes the remote login shell is bash (`pipefail` is a bashism;
                      # dash/sh would error out immediately here — fail-loud, not silent).
                      set -euo pipefail

                      echo "Export GitHub secrets into environment variables"
                      export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD_STAGING }}"
                      export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
                      export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
                      # Optional: set DATABASE_SSL secret to "require" / "verify-full"
                      # for managed/external DBs. Leave unset for the current
                      # trusted-network Docker DB.
                      export DATABASE_SSL="${{ secrets.DATABASE_SSL }}"
                      export DEPLOY_SHA="${{ github.sha }}"
                      export APP_IMAGE_TAG="sha-${DEPLOY_SHA}"
                      export DB_BACKUP_IMAGE_TAG="sha-${DEPLOY_SHA}"
                      export EMAIL="${{ secrets.EMAIL }}"
                      export AUTH_GITHUB_ID="${{ secrets.AUTH_GITHUB_ID }}"
                      export AUTH_GITHUB_SECRET="${{ secrets.AUTH_GITHUB_SECRET }}"
                      export AUTH_SECRET="${{ secrets.AUTH_SECRET }}"
                      export AUTH_GITHUB_APP_ID="${{ secrets.AUTH_GITHUB_APP_ID }}"
                      export AUTH_GITHUB_APP_PRIVATE_KEY="${{ secrets.AUTH_GITHUB_APP_PRIVATE_KEY }}"
                      export AUTH_GITHUB_APP_INSTALLATION_ID="${{ secrets.AUTH_GITHUB_APP_INSTALLATION_ID }}"
                      export GITHUB_ORG="vasteras-stadsmission"
                      export DOMAIN_NAME="staging.matcentralen.com"
                      export BRAND_NAME="Matcentralen"
                      export ENV_NAME="staging"
                      export LOG_LEVEL="debug"
                      export HELLO_SMS_TEST_MODE="true"
                      export SMS_SEND_INTERVAL="30 seconds"
                      export ANONYMIZATION_SCHEDULE="*/15 * * * *"
                      export ANONYMIZATION_INACTIVE_DURATION="365 days"
                      export ORG_SYNC_SCHEDULE="0 3 * * *"
                      # SMS credentials not needed in staging (test mode only)
                      # Backups disabled on staging by policy (no db-backup related secrets exported)
                      export SWIFT_PREFIX="backups/${ENV_NAME}"

                      # Explicit path rather than `~/matkassen`. ssh-action runs as
                      # the `ubuntu` user so `~` resolves correctly today, but
                      # hardcoding prevents a future `sudo ...` wrapper from
                      # silently redirecting to /root/matkassen.
                      APP_DIR="/home/ubuntu/matkassen"
                      if [ ! -d "$APP_DIR" ]; then
                          echo "❌ App directory not found"
                          exit 1
                      fi
                      cd "$APP_DIR"

                      # Force-align the repo to this workflow's exact commit regardless
                      # of the branch that happens to be checked out on the VPS. This
                      # keeps the checked-out repo in lockstep with the immutable sha-*
                      # image tags built by this run, even if a newer main push exists.
                      echo "Aligning VPS repo to ${DEPLOY_SHA}..."
                      if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
                          git fetch --prune --unshallow origin main
                      else
                          git fetch --prune origin main
                      fi
                      git checkout --force -B main "$DEPLOY_SHA"
                      git clean -fd
                      ACTUAL_SHA="$(git rev-parse HEAD)"
                      if [ "$ACTUAL_SHA" != "$DEPLOY_SHA" ]; then
                          echo "❌ VPS checkout mismatch: got $ACTUAL_SHA, expected $DEPLOY_SHA"
                          exit 1
                      fi
                      echo "HEAD: $ACTUAL_SHA  (workflow SHA: $DEPLOY_SHA)"

                      # Run the update.sh script which will apply migrations.
                      # `set -euo pipefail` above means a non-zero exit terminates the
                      # whole script, so the previous UPDATE_STATUS dance is redundant.
                      chmod +x update.sh
                      ./update.sh
                      echo "✅ Successfully deployed all updates."

            - name: Verify staging deployment
              run: |
                  set -euo pipefail

                  require_healthy() {
                      local domain="$1"
                      local url="https://${domain}/api/health"
                      local body=""
                      local health_status=""

                      for attempt in $(seq 1 30); do
                          if body=$(curl -fsS --max-time 10 "$url"); then
                              health_status=$(printf '%s' "$body" | python3 -c 'import json, sys; print(json.load(sys.stdin).get("status", ""))' 2>/dev/null || true)
                              if [ "$health_status" = "healthy" ]; then
                                  echo "✅ ${url} is healthy"
                                  return 0
                              fi
                              echo "Health status for ${url}: ${health_status:-unparseable} (attempt ${attempt}/30)"
                          else
                              echo "Health request failed for ${url} (attempt ${attempt}/30)"
                          fi
                          sleep 2
                      done

                      echo "❌ ${url} did not become healthy"
                      echo "Last response: ${body}"
                      return 1
                  }

                  verify_domain() {
                      local domain="$1"
                      local base_url="https://${domain}"
                      local root_code
                      local redirect_code
                      local redirect_location
                      local headers

                      require_healthy "$domain"

                      root_code=$(curl -fsSL -o /dev/null -w '%{http_code}' --max-time 20 "$base_url")
                      if [ "$root_code" != "200" ]; then
                          echo "❌ ${base_url} returned ${root_code}, expected 200"
                          return 1
                      fi
                      echo "✅ ${base_url} resolves with 200"

                      redirect_code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 "http://${domain}/api/health")
                      redirect_location=$(curl -sS -D - -o /dev/null --max-time 10 "http://${domain}/api/health" | awk 'BEGIN { IGNORECASE=1 } /^Location:/ { print $2; exit }' | tr -d '\r')
                      if [ "$redirect_code" != "301" ] || [ "$redirect_location" != "https://${domain}/api/health" ]; then
                          echo "❌ HTTP redirect for ${domain} returned ${redirect_code} -> ${redirect_location}"
                          return 1
                      fi
                      echo "✅ HTTP redirect for ${domain} is correct"

                      headers=$(curl -sS -D - -o /dev/null --max-time 10 "${base_url}/api/health")
                      if ! printf '%s\n' "$headers" | grep -qi '^Strict-Transport-Security: '; then
                          echo "❌ Missing HSTS header for ${domain}"
                          return 1
                      fi
                      echo "✅ HSTS header present for ${domain}"
                  }

                  verify_domain "staging.matcentralen.com"

    manual-deploy-to-production:
        needs: deploy-to-staging
        environment:
            name: production
            url: https://matcentralen.com
        runs-on: ubuntu-latest
        # Promote the exact image that this run built and verified in staging;
        # never substitute a newer `main`/`latest` image after approval. Production
        # deploys are serialized, and `cancel-in-progress` stays false so a new push
        # cannot interrupt an active deploy. Consequently, an older run waiting for
        # approval can hold this group while the newest run is pending. In that case,
        # reject or cancel the older run as superseded, then approve the newest run.
        # Do not approve the old run just to clear the queue: the freshness check
        # below will intentionally reject its stale SHA.
        concurrency:
            group: deploy-production
            cancel-in-progress: false
        steps:
            - name: Deploy to production
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
              with:
                  host: ${{ secrets.SERVER_HOST_PRODUCTION }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  script: |
                      # Fail fast on errors — see deploy-to-staging above for context.
                      # Assumes the remote login shell is bash (`pipefail` is a bashism).
                      set -euo pipefail

                      echo "Export GitHub secrets into environment variables"
                      export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD_PRODUCTION }}"
                      export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
                      export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
                      # Optional: set DATABASE_SSL secret to "require" / "verify-full"
                      # for managed/external DBs. Leave unset for the current
                      # trusted-network Docker DB.
                      export DATABASE_SSL="${{ secrets.DATABASE_SSL }}"
                      export DEPLOY_SHA="${{ github.sha }}"
                      export APP_IMAGE_TAG="sha-${DEPLOY_SHA}"
                      export DB_BACKUP_IMAGE_TAG="sha-${DEPLOY_SHA}"
                      export EMAIL="${{ secrets.EMAIL }}"
                      export AUTH_GITHUB_ID="${{ secrets.AUTH_GITHUB_ID }}"
                      export AUTH_GITHUB_SECRET="${{ secrets.AUTH_GITHUB_SECRET }}"
                      export AUTH_SECRET="${{ secrets.AUTH_SECRET }}"
                      export AUTH_GITHUB_APP_ID="${{ secrets.AUTH_GITHUB_APP_ID }}"
                      export AUTH_GITHUB_APP_PRIVATE_KEY="${{ secrets.AUTH_GITHUB_APP_PRIVATE_KEY }}"
                      export AUTH_GITHUB_APP_INSTALLATION_ID="${{ secrets.AUTH_GITHUB_APP_INSTALLATION_ID }}"
                      export GITHUB_ORG="vasteras-stadsmission"
                      export DOMAIN_NAME="matcentralen.com"
                      export BRAND_NAME="Matcentralen"
                      export SMS_SENDER="Matcentral"
                      export ENV_NAME="production"
                      export LOG_LEVEL="info"
                      export HELLO_SMS_USERNAME="${{ secrets.HELLO_SMS_USERNAME }}"
                      export HELLO_SMS_PASSWORD="${{ secrets.HELLO_SMS_PASSWORD }}"
                      export HELLO_SMS_TEST_MODE="false"
                      export SMS_SEND_INTERVAL="5 minutes"
                      export SMS_CALLBACK_SECRET="${{ secrets.SMS_CALLBACK_SECRET }}"
                      export ANONYMIZATION_SCHEDULE="0 2 * * 0"
                      export ANONYMIZATION_INACTIVE_DURATION="1 year"
                      export ORG_SYNC_SCHEDULE="0 3 * * *"
                      export DB_BACKUP_PASSPHRASE="${{ secrets.DB_BACKUP_PASSPHRASE }}"

                      # OpenStack Swift (env_auth) - hardcoded non-sensitive values
                      export OS_AUTH_TYPE=v3applicationcredential
                      export OS_AUTH_URL=https://ops.elastx.cloud:5000/v3
                      export OS_REGION_NAME=se-sto
                      export OS_INTERFACE=public
                      export OS_IDENTITY_API_VERSION=3
                      export OS_APPLICATION_CREDENTIAL_ID="${{ secrets.OS_APPLICATION_CREDENTIAL_ID }}"
                      export OS_APPLICATION_CREDENTIAL_SECRET="${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}"
                      export SWIFT_CONTAINER="${{ secrets.SWIFT_CONTAINER }}"
                      export SWIFT_PREFIX="backups/${ENV_NAME}"

                      # Slack bot (single summary per backup)
                      export SLACK_BOT_TOKEN="${{ secrets.SLACK_BOT_TOKEN }}"
                      export SLACK_CHANNEL_ID="${{ secrets.SLACK_CHANNEL_ID }}"

                      # Explicit path rather than `~/matkassen`. ssh-action runs as
                      # the `ubuntu` user so `~` resolves correctly today, but
                      # hardcoding prevents a future `sudo ...` wrapper from
                      # silently redirecting to /root/matkassen.
                      APP_DIR="/home/ubuntu/matkassen"
                      if [ ! -d "$APP_DIR" ]; then
                          echo "❌ App directory not found"
                          exit 1
                      fi
                      cd "$APP_DIR"

                      # With immutable image tags, approving an old production
                      # deployment would intentionally deploy that older commit.
                      # This workflow is for normal forward deploys, not
                      # rollbacks, so refuse stale manual approvals.
                      echo "Checking production approval freshness..."
                      LATEST_MAIN_SHA="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
                      if [ "$LATEST_MAIN_SHA" != "$DEPLOY_SHA" ]; then
                          echo "❌ Refusing stale production deploy."
                          echo "Workflow SHA: $DEPLOY_SHA"
                          echo "Current main: $LATEST_MAIN_SHA"
                          echo "Start a fresh deployment from the current main branch, or use an explicit rollback workflow."
                          exit 1
                      fi
                      echo "✅ Production approval targets current main."

                      # Force-align the repo to the exact workflow commit so repo state
                      # matches the immutable sha-* image tags built by this run.
                      echo "Aligning VPS repo to ${DEPLOY_SHA}..."
                      if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
                          git fetch --prune --unshallow origin main
                      else
                          git fetch --prune origin main
                      fi
                      git checkout --force -B main "$DEPLOY_SHA"
                      git clean -fd
                      ACTUAL_SHA="$(git rev-parse HEAD)"
                      if [ "$ACTUAL_SHA" != "$DEPLOY_SHA" ]; then
                          echo "❌ VPS checkout mismatch: got $ACTUAL_SHA, expected $DEPLOY_SHA"
                          exit 1
                      fi
                      echo "HEAD: $ACTUAL_SHA  (workflow SHA: $DEPLOY_SHA)"

                      chmod +x update.sh
                      ./update.sh
                      echo "✅ Successfully deployed all updates."

            - name: Verify production deployment
              run: |
                  set -euo pipefail

                  require_healthy() {
                      local domain="$1"
                      local url="https://${domain}/api/health"
                      local body=""
                      local health_status=""

                      for attempt in $(seq 1 30); do
                          if body=$(curl -fsS --max-time 10 "$url"); then
                              health_status=$(printf '%s' "$body" | python3 -c 'import json, sys; print(json.load(sys.stdin).get("status", ""))' 2>/dev/null || true)
                              if [ "$health_status" = "healthy" ]; then
                                  echo "✅ ${url} is healthy"
                                  return 0
                              fi
                              echo "Health status for ${url}: ${health_status:-unparseable} (attempt ${attempt}/30)"
                          else
                              echo "Health request failed for ${url} (attempt ${attempt}/30)"
                          fi
                          sleep 2
                      done

                      echo "❌ ${url} did not become healthy"
                      echo "Last response: ${body}"
                      return 1
                  }

                  verify_domain() {
                      local domain="$1"
                      local base_url="https://${domain}"
                      local root_code
                      local redirect_code
                      local redirect_location
                      local headers

                      require_healthy "$domain"

                      root_code=$(curl -fsSL -o /dev/null -w '%{http_code}' --max-time 20 "$base_url")
                      if [ "$root_code" != "200" ]; then
                          echo "❌ ${base_url} returned ${root_code}, expected 200"
                          return 1
                      fi
                      echo "✅ ${base_url} resolves with 200"

                      redirect_code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 "http://${domain}/api/health")
                      redirect_location=$(curl -sS -D - -o /dev/null --max-time 10 "http://${domain}/api/health" | awk 'BEGIN { IGNORECASE=1 } /^Location:/ { print $2; exit }' | tr -d '\r')
                      if [ "$redirect_code" != "301" ] || [ "$redirect_location" != "https://${domain}/api/health" ]; then
                          echo "❌ HTTP redirect for ${domain} returned ${redirect_code} -> ${redirect_location}"
                          return 1
                      fi
                      echo "✅ HTTP redirect for ${domain} is correct"

                      headers=$(curl -sS -D - -o /dev/null --max-time 10 "${base_url}/api/health")
                      if ! printf '%s\n' "$headers" | grep -qi '^Strict-Transport-Security: '; then
                          echo "❌ Missing HSTS header for ${domain}"
                          return 1
                      fi
                      echo "✅ HSTS header present for ${domain}"
                  }

                  verify_domain "matcentralen.com"
                  verify_domain "www.matcentralen.com"
