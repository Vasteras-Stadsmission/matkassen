name: Continuous Deployment

on:
    push:
        branches: [main]

permissions:
    contents: read
    packages: write # Required for pushing to GHCR

jobs:
    publish-images:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - name: Main Application
                      dockerfile: Dockerfile
                      image_name: vasteras-stadsmission/matkassen
                      context: .
                    - name: Database Backup Service
                      dockerfile: Dockerfile.db-backup
                      image_name: vasteras-stadsmission/matkassen-db-backup
                      context: .

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
              with:
                  images: ghcr.io/${{ matrix.image_name }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha,prefix=sha-,format=short

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: Build and push ${{ matrix.name }}
              uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Image published successfully
              run: |
                  echo "✅ ${{ matrix.name }} published to GHCR"
                  echo "📦 Image: ghcr.io/${{ matrix.image_name }}"
                  echo "🏷️  Tags: ${{ steps.meta.outputs.tags }}"

    deploy-to-staging:
        needs: publish-images
        runs-on: ubuntu-latest
        environment:
            name: staging
            url: https://staging.matcentralen.com
        steps:
            - name: Deploy to staging
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
              with:
                  host: ${{ secrets.SERVER_HOST_STAGING }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  script: |
                      # Fail fast on errors — this block used to swallow git failures and
                      # leave the VPS on an outdated commit while reporting success.
                      # Assumes the remote login shell is bash (`pipefail` is a bashism;
                      # dash/sh would error out immediately here — fail-loud, not silent).
                      set -euo pipefail

                      echo "Export GitHub secrets into environment variables"
                      export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD_STAGING }}"
                      export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
                      export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
                      # Optional: set DATABASE_SSL secret to "require" / "verify-full"
                      # for managed/external DBs. Leave unset for the current
                      # trusted-network Docker DB.
                      export DATABASE_SSL="${{ secrets.DATABASE_SSL }}"
                      export EMAIL="${{ secrets.EMAIL }}"
                      export AUTH_GITHUB_ID="${{ secrets.AUTH_GITHUB_ID }}"
                      export AUTH_GITHUB_SECRET="${{ secrets.AUTH_GITHUB_SECRET }}"
                      export AUTH_SECRET="${{ secrets.AUTH_SECRET }}"
                      export AUTH_GITHUB_APP_ID="${{ secrets.AUTH_GITHUB_APP_ID }}"
                      export AUTH_GITHUB_APP_PRIVATE_KEY="${{ secrets.AUTH_GITHUB_APP_PRIVATE_KEY }}"
                      export AUTH_GITHUB_APP_INSTALLATION_ID="${{ secrets.AUTH_GITHUB_APP_INSTALLATION_ID }}"
                      export GITHUB_ORG="vasteras-stadsmission"
                      export DOMAIN_NAME="staging.matcentralen.com"
                      export BRAND_NAME="Matcentralen"
                      export ENV_NAME="staging"
                      export LOG_LEVEL="debug"
                      export HELLO_SMS_TEST_MODE="true"
                      export SMS_SEND_INTERVAL="30 seconds"
                      export ANONYMIZATION_SCHEDULE="*/15 * * * *"
                      export ANONYMIZATION_INACTIVE_DURATION="5 minutes"
                      export ORG_SYNC_SCHEDULE="0 3 * * *"
                      # SMS credentials not needed in staging (test mode only)
                      # Backups disabled on staging by policy (no db-backup related secrets exported)
                      export SWIFT_PREFIX="backups/${ENV_NAME}"

                      # Explicit path rather than `~/matkassen`. ssh-action runs as
                      # the `ubuntu` user so `~` resolves correctly today, but
                      # hardcoding prevents a future `sudo ...` wrapper from
                      # silently redirecting to /root/matkassen.
                      APP_DIR="/home/ubuntu/matkassen"
                      if [ ! -d "$APP_DIR" ]; then
                          echo "❌ App directory not found"
                          exit 1
                      fi
                      cd "$APP_DIR"

                      # Force-align the repo to origin/main regardless of the branch
                      # that happens to be checked out on the VPS. `git reset --hard HEAD`
                      # followed by `git pull origin main` silently fails to update when
                      # HEAD is on a diverged branch — that's how staging ended up stuck
                      # on an old feature branch for ~a week.
                      echo "Aligning VPS repo to origin/main..."
                      git fetch --prune origin main
                      git checkout --force -B main origin/main
                      git clean -fd
                      echo "HEAD: $(git rev-parse HEAD)  (workflow SHA: ${{ github.sha }})"

                      # Run the update.sh script which will apply migrations.
                      # `set -euo pipefail` above means a non-zero exit terminates the
                      # whole script, so the previous UPDATE_STATUS dance is redundant.
                      chmod +x update.sh
                      ./update.sh
                      echo "✅ Successfully deployed all updates."

    manual-deploy-to-production:
        needs: deploy-to-staging
        environment:
            name: production
            url: https://matcentralen.com
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to production
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
              with:
                  host: ${{ secrets.SERVER_HOST_PRODUCTION }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  script: |
                      # Fail fast on errors — see deploy-to-staging above for context.
                      # Assumes the remote login shell is bash (`pipefail` is a bashism).
                      set -euo pipefail

                      echo "Export GitHub secrets into environment variables"
                      export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD_PRODUCTION }}"
                      export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
                      export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
                      # Optional: set DATABASE_SSL secret to "require" / "verify-full"
                      # for managed/external DBs. Leave unset for the current
                      # trusted-network Docker DB.
                      export DATABASE_SSL="${{ secrets.DATABASE_SSL }}"
                      export EMAIL="${{ secrets.EMAIL }}"
                      export AUTH_GITHUB_ID="${{ secrets.AUTH_GITHUB_ID }}"
                      export AUTH_GITHUB_SECRET="${{ secrets.AUTH_GITHUB_SECRET }}"
                      export AUTH_SECRET="${{ secrets.AUTH_SECRET }}"
                      export AUTH_GITHUB_APP_ID="${{ secrets.AUTH_GITHUB_APP_ID }}"
                      export AUTH_GITHUB_APP_PRIVATE_KEY="${{ secrets.AUTH_GITHUB_APP_PRIVATE_KEY }}"
                      export AUTH_GITHUB_APP_INSTALLATION_ID="${{ secrets.AUTH_GITHUB_APP_INSTALLATION_ID }}"
                      export GITHUB_ORG="vasteras-stadsmission"
                      export DOMAIN_NAME="matcentralen.com"
                      export BRAND_NAME="Matcentralen"
                      export SMS_SENDER="Matcentral"
                      export ENV_NAME="production"
                      export LOG_LEVEL="info"
                      export HELLO_SMS_USERNAME="${{ secrets.HELLO_SMS_USERNAME }}"
                      export HELLO_SMS_PASSWORD="${{ secrets.HELLO_SMS_PASSWORD }}"
                      export HELLO_SMS_TEST_MODE="false"
                      export SMS_SEND_INTERVAL="5 minutes"
                      export SMS_CALLBACK_SECRET="${{ secrets.SMS_CALLBACK_SECRET }}"
                      export ANONYMIZATION_SCHEDULE="0 2 * * 0"
                      export ANONYMIZATION_INACTIVE_DURATION="1 year"
                      export ORG_SYNC_SCHEDULE="0 3 * * *"
                      export DB_BACKUP_PASSPHRASE="${{ secrets.DB_BACKUP_PASSPHRASE }}"

                      # OpenStack Swift (env_auth) - hardcoded non-sensitive values
                      export OS_AUTH_TYPE=v3applicationcredential
                      export OS_AUTH_URL=https://ops.elastx.cloud:5000/v3
                      export OS_REGION_NAME=se-sto
                      export OS_INTERFACE=public
                      export OS_IDENTITY_API_VERSION=3
                      export OS_APPLICATION_CREDENTIAL_ID="${{ secrets.OS_APPLICATION_CREDENTIAL_ID }}"
                      export OS_APPLICATION_CREDENTIAL_SECRET="${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}"
                      export SWIFT_CONTAINER="${{ secrets.SWIFT_CONTAINER }}"
                      export SWIFT_PREFIX="backups/${ENV_NAME}"

                      # Slack bot (single summary per backup)
                      export SLACK_BOT_TOKEN="${{ secrets.SLACK_BOT_TOKEN }}"
                      export SLACK_CHANNEL_ID="${{ secrets.SLACK_CHANNEL_ID }}"

                      # Explicit path rather than `~/matkassen`. ssh-action runs as
                      # the `ubuntu` user so `~` resolves correctly today, but
                      # hardcoding prevents a future `sudo ...` wrapper from
                      # silently redirecting to /root/matkassen.
                      APP_DIR="/home/ubuntu/matkassen"
                      if [ ! -d "$APP_DIR" ]; then
                          echo "❌ App directory not found"
                          exit 1
                      fi
                      cd "$APP_DIR"

                      # Force-align the repo to origin/main regardless of the branch
                      # that happens to be checked out on the VPS (see staging block).
                      echo "Aligning VPS repo to origin/main..."
                      git fetch --prune origin main
                      git checkout --force -B main origin/main
                      git clean -fd
                      echo "HEAD: $(git rev-parse HEAD)  (workflow SHA: ${{ github.sha }})"

                      chmod +x update.sh
                      ./update.sh
                      echo "✅ Successfully deployed all updates."
